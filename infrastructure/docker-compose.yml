# Client360 — local development stack (E1.2).
#
# PostgreSQL is the primary reproducibility win: a developer without a local
# database gets a pinned, disposable one. The application service is OPTIONAL
# (profile "app") — most developers run the app in the repo virtualenv via
# scripts/dev.sh and only need the database here.
#
# Usage:
#   docker compose -f infrastructure/docker-compose.yml up -d db        # database only
#   docker compose -f infrastructure/docker-compose.yml --profile app up --build
#   docker compose -f infrastructure/docker-compose.yml down            # stop
#   docker compose -f infrastructure/docker-compose.yml down -v         # stop + drop data
#
# NO SECRETS: the values below are non-secret local development defaults. Override
# via your shell/local env; never commit real credentials.
name: client360-dev

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-client360}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - client360_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-client360}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Optional: only started with `--profile app`. Runs migrations then the app.
    profiles: ["app"]
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    environment:
      CLIENT360_ENVIRONMENT: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-client360}
      # SESSION_SECRET / MICROSOFT_TOKEN_KEY intentionally unset: the marked dev
      # fallback applies. Provide via your own env for production-like runs.
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    command:
      - sh
      - -c
      - "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  client360_pgdata:
