name: Client360 E2E (advisory)

# Browser end-to-end smoke suite (Playwright). Introduced as its OWN workflow so
# it is naturally non-gating (not a required status check) until it has been
# observed green in CI — the same "baseline first, promote to a gate later"
# approach the repo uses for mypy. Promote by adding it to branch protection once
# stable.

on:
  push:
    branches:
      - main
      - feature/**
      - release/**
  pull_request:
    branches:
      - main

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: client360_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/client360_ci
      SESSION_SECRET: test-session-secret-not-for-production
      CLIENT360_ENVIRONMENT: development
      SESSION_HTTPS_ONLY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-e2e.txt

      - name: Install Playwright browser (Chromium)
        run: python -m playwright install --with-deps chromium

      - name: Migrate the disposable database to head
        run: alembic upgrade head

      - name: Run browser smoke suite
        run: python -m pytest e2e/ -q

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            test-results/
          if-no-files-found: ignore
          retention-days: 7
