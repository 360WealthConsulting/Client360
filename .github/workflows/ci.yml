name: Client360 CI

on:
  push:
    branches:
      - main
      - feature/**
      - release/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # The suite talks to a real database (app/db.py reflects the schema at
    # import time), so CI provisions a disposable Postgres rather than mocking.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: client360_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/client360_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 3.12 is the project runtime as of 0.9.13 Phase 1. The old 3.9 pin existed
      # only because typer required click>=8.2.1 on >=3.10 while click==8.1.8 was
      # pinned — but typer was an orphan (imported nowhere, required by nothing),
      # so removing it dissolved the constraint with no version change to click.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest

      # Ruff new-violation gate (0.9.13 Phase 2). The legacy backlog is baselined
      # in docs/ruff-baseline.json and deliberately not fixed here; this fails the
      # build only when a change ADDS a violation (see scripts/ruff_gate.py).
      - name: Lint (Ruff gate)
        run: |
          pip install ruff==0.15.21
          python scripts/ruff_gate.py

      - name: Compile application
        run: |
          python -m compileall app

      - name: Apply migrations
        run: |
          alembic upgrade head

      # `python -m pytest` (not bare `pytest`) so the repo root lands on
      # sys.path and `import app` resolves. The result is deliberately not
      # suppressed: a failing test must fail the build.
      - name: Run tests
        run: |
          python -m pytest -q
