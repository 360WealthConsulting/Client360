name: Client360 CI

on:
  push:
    branches:
      - main
      - feature/**
      - release/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # The suite talks to a real database (app/db.py reflects the schema at
    # import time), so CI provisions a disposable Postgres rather than mocking.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: client360_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/client360_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest

      - name: Compile application
        run: |
          python -m compileall app

      - name: Apply migrations
        run: |
          alembic upgrade head

      # `python -m pytest` (not bare `pytest`) so the repo root lands on
      # sys.path and `import app` resolves. The result is deliberately not
      # suppressed: a failing test must fail the build.
      - name: Run tests
        run: |
          python -m pytest -q
