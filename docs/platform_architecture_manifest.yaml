# Client360 Platform Architecture Manifest (Phase D.12A)
#
# Machine-readable architecture metadata for docs/PLATFORM_ARCHITECTURE.md.
# tests/test_platform_architecture.py validates this manifest against the LIVE code
# (route count, migration head, seeded capabilities, module existence, import
# direction, schema registration) so the authoritative document cannot silently drift.
#
# This is architecture metadata, NOT runtime configuration — nothing in app/ imports it.
# Verified against the repository state after Phase D.12 (release/0.13.0).

meta:
  migration_head: s9d0e1f2a3b4      # `alembic heads` / `alembic current`
  route_count: 511                  # len(app.routes); guarded by tests/test_f4_8_workflow_api.py
  production_capability_count: 122    # seeded capabilities excluding e2_2.cap.* test fixtures
  verified_by:
    route_count: "python -c 'from app.main import app; print(len(app.routes))'"
    migration_head: "alembic heads"
    capabilities: "select code from capabilities"

# Composition service modules that MUST exist (existence test).
composition_service_modules:
  - app/services/advisor_workspace.py        # Client 360 + meeting workspace
  - app/services/activity_timeline/service.py # Activity Timeline projection
  - app/services/annual_review.py            # Annual Review
  - app/services/business_owner.py           # Business Owner Planning
  - app/services/reporting/service.py        # Enterprise Reporting (D.21 composition layer)

# The composition-layer module base-names. Source/producer domains must NOT import these
# (upward-dependency test). Consumers importing producers is the ALLOWED direction.
composition_layer_modules:
  - annual_review
  - business_owner
  - reporting

# Source/producer service modules that must not import a composition layer (import-direction
# test). advisor_intelligence must additionally not import any of its consumers; source
# producers must not import activity_timeline.
source_producer_modules:
  - app/services/advisor_intelligence.py
  - app/services/advisor_work.py
  - app/services/compliance/reviews.py
  - app/services/compliance/rule_catalog.py
  - app/services/organization_service.py
  - app/services/tax_domain.py
  - app/services/insurance.py
  - app/services/benefits_domain.py

# advisor_intelligence must not import these consumers (D.5 invariant).
advisor_intelligence_forbidden_imports:
  - advisor_work
  - annual_review
  - business_owner
  - activity_timeline

# Declared-schema registration: each define_* must be called in app/database/schema.py.
declared_schema_registrations:
  - define_advisor_work_tables
  - define_analytics_tables
  - define_annual_review_tables
  - define_business_planning_tables
  - define_campaign_referral_tables
  - define_communication_tables
  - define_document_platform_tables
  - define_compliance_tables
  - define_identity_tables
  - define_operations_tables
  - define_opportunity_tables
  - define_outbox_tables
  - define_portfolio_tables
  - define_reporting_tables
  - define_scheduling_tables
  - define_work_tables

# Capabilities the architecture document references. Every entry MUST exist in the seeded
# capabilities table (subset test). Grouped by domain for the human document.
capabilities:
  identity_admin: [identity.manage, role.manage, team.manage, assignment.manage,
                   record.read_all, record.write_all, audit.read]
  client: [client.read, client.write, task.read, task.write, document.read, document.write,
           communication.read, communication.write]
  work: [work.read, work.write, work.approve, capacity.read]
  organization: [organization.read, organization.write]
  benefits: [benefits.read, benefits.write, benefits.enroll, benefits.compliance,
             benefits.sensitive.read]
  insurance: [insurance.read, insurance.write, insurance.suitability, insurance.scan,
              insurance.commissions.read, insurance.commissions.write,
              insurance.licensing.read, insurance.licensing.write, insurance.sensitive.read]
  tax: [tax.read, tax.write, tax.review, tax.deadline.manage, tax.intake.read,
        tax.intake.write, tax.document.review]
  exceptions: [exception.read, exception.write, exception.resolve, exception.compliance]
  advisor_work: [advisor_work.read, advisor_work.create, advisor_work.assign, advisor_work.update]
  compliance: [compliance.review.read, compliance.review.submit, compliance.review.assign,
               compliance.review.decide, compliance.authority.read, compliance.authority.manage]
  timeline: [timeline.read]
  annual_review: [annual_review.read, annual_review.create, annual_review.update]
  business_owner: [business_owner.read, business_owner.update, business_owner.planning_update]
  opportunity: [opportunity.view, opportunity.edit, opportunity.delete, opportunity.assign,
                opportunity.close, opportunity.report, opportunity.forecast]
  campaign: [campaign.view, campaign.edit, campaign.delete, campaign.report, campaign.archive,
             campaign.manage_budget, campaign.manage_roi]
  referral: [referral.view, referral.edit, referral.delete, referral.report]
  analytics: [analytics.view, analytics.executive, analytics.export, analytics.manage_targets,
              analytics.manage_dashboards]
  documents: [documents.view, documents.edit, documents.delete, documents.version,
              documents.approve, documents.archive, documents.restore, documents.export,
              documents.manage_retention]
  workflow: [workflow.view, workflow.edit, workflow.execute, workflow.cancel,
             workflow.template_manage, workflow.admin, workflow.audit]
  communications: [communications.view, communications.send, communications.manage_templates,
                   communications.audit, communications.admin]
  scheduling: [scheduling.view, scheduling.manage, scheduling.templates, scheduling.audit,
               scheduling.admin]
  operations: [operations.view, operations.manage, operations.templates, operations.audit,
               operations.admin]
  reporting: [reporting.view, reporting.manage, reporting.templates, reporting.audit,
              reporting.admin]

# Composition layers: consume, never own source data, never a source of truth.
composition_layers:
  advisor_workspace:
    consumes: [portfolio, insurance, tax, benefits, tasks, exceptions, timeline]
    persists: []                       # meeting outcomes route to owning services
    is_source_of_truth: false
  activity_timeline:
    consumes: [timeline_events, advisor_work_events, compliance_reviews, compliance_decisions]
    persists: []                       # pure read projection; no table
    is_source_of_truth: false
  annual_review:
    consumes: [advisor_workspace, advisor_intelligence, advisor_work, activity_timeline,
               compliance, portfolio]
    persists: [annual_review_sessions] # advisor-activity record only
    is_source_of_truth: false
  business_owner:
    consumes: [organization_service, tax_domain, benefits_domain, insurance,
               advisor_intelligence, advisor_work, activity_timeline, compliance, annual_review]
    persists: [business_planning_profiles] # succession/continuity facts with no other home
    is_source_of_truth: false
  reporting:
    consumes: [analytics, operations, scheduling, communications, workflow, advisor_work,
               compliance, opportunity, campaign, referral, annual_review, business_owner, timeline]
    persists: [report_templates, report_definitions, reports, reporting_dashboards,
               reporting_widgets, reporting_scorecards, reporting_kpi_groups, reporting_saved_views,
               reporting_export_profiles, report_schedules] # reporting definitions/config only
    is_source_of_truth: false            # KPI values composed from Analytics at render time

# Data with no authoritative domain — must be shown as "Not currently modeled".
not_currently_modeled:
  - tax_return_financial_content        # K-1, W-2 wages, guaranteed payments, distributions, QBI
  - owner_compensation
  - insurance_policy_purpose            # key-person / buy-sell / exec-bonus / split-dollar
  - disability_and_ltc_insurance
  - retirement_contribution_amounts     # incl. Cash Balance / Defined Benefit funding
  - business_valuation
  - per_client_servicing_advisor
  - business_link_on_advisor_work_items
  - business_link_on_compliance_reviews
  - historical_household_membership_windows

# Importers / external sources (do NOT claim live sync where only import infra exists).
importers:
  schwab: implemented          # app/importers/schwab.py
  assetmark: implemented       # app/importers/assetmark.py
  wealthbox: implemented       # app/importers/wealthbox.py
  dave_ramsey: implemented     # app/importers/dave_ramsey.py (SmartVestor)
  microsoft365: integration    # OAuth + calendar/mail/documents routes
  taxdome: not_implemented     # SOP reference only
  drake: not_implemented       # SOP reference only
  betterment: stub             # disabled recordkeeper provider stub
  guideline: not_implemented   # comment-only future example
  gusto: not_implemented

