<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Audit Log</title><link rel="stylesheet" href="/static/css/main.css"></head><body><main><h1>Immutable Audit Log</h1><table><tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Outcome</th><th>Request</th></tr>{% for event in events %}<tr><td>{{ event.occurred_at }}</td><td>{{ event.actor_user_id or "System" }}</td><td>{{ event.action }}</td><td>{{ event.entity_type }} {{ event.entity_id or "" }}</td><td>{{ event.outcome }}</td><td>{{ event.request_id }}</td></tr>{% endfor %}</table></main></body></html>
