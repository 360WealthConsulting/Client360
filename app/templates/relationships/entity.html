<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ entity.name }} - Client360</title><link rel="stylesheet" href="/static/css/main.css"></head>
<body><header style="background:#111827;color:white;padding:28px 40px;"><h1>{{ entity.name }}</h1><p>{{ entity.entity_type.replace("_", " ").title() }}</p></header>
<main style="max-width:900px;padding:32px 40px;"><p><a href="javascript:history.back()">← Back</a></p><section class="card"><h2>Record Details</h2>{% for key, value in entity.details.items() %}<p><strong>{{ key.replace("_", " ").title() }}:</strong> {{ value }}</p>{% else %}<p>No additional details recorded.</p>{% endfor %}</section></main></body>
</html>
